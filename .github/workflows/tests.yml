name: Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest pytest-qt
        python -m pip install .
      shell: bash
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Install Qt runtime deps (Linux only)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xkb1 libdbus-1-3 libxi6 libxrender1

    - name: Run tests
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Linux" ] && [ "${{ matrix.python-version }}" = "3.13" ]; then
          export QT_QPA_PLATFORM=offscreen
          export PYTHONFAULTHANDLER=1
          export PYTHONMALLOC=debug
          echo "Running Linux Python 3.13 diagnostics: UI/package tests first"
          xvfb-run -a python -X dev -X faulthandler -m pytest tests/test_package_init.py tests/ui/test_ui.py -q
          echo "Running Linux Python 3.13 diagnostics: remaining tests"
          xvfb-run -a python -X dev -X faulthandler -m pytest tests -q --ignore=tests/test_package_init.py --ignore=tests/ui/test_ui.py
        elif [ "${{ runner.os }}" = "Linux" ]; then
          export QT_QPA_PLATFORM=offscreen
          xvfb-run -a python -m pytest -q
        elif [ "${{ runner.os }}" = "Windows" ] && [ "${{ matrix.python-version }}" = "3.13" ]; then
          export PYTHONFAULTHANDLER=1
          export PYTHONMALLOC=debug
          echo "Running Windows Python 3.13 diagnostics: UI/package tests first"
          python -X dev -X faulthandler -m pytest tests/test_package_init.py tests/ui/test_ui.py -q
          echo "Running Windows Python 3.13 diagnostics: remaining tests"
          python -X dev -X faulthandler -m pytest tests -q --ignore=tests/test_package_init.py --ignore=tests/ui/test_ui.py
        elif [ "${{ runner.os }}" = "macOS" ] && [ "${{ matrix.python-version }}" = "3.13" ]; then
          export PYTHONFAULTHANDLER=1
          export PYTHONMALLOC=debug
          echo "Running macOS Python 3.13 diagnostics: UI/package tests first"
          python -X dev -X faulthandler -m pytest tests/test_package_init.py tests/ui/test_ui.py -q
          echo "Running macOS Python 3.13 diagnostics: remaining tests"
          python -X dev -X faulthandler -m pytest tests -q --ignore=tests/test_package_init.py --ignore=tests/ui/test_ui.py
        else
          python -m pytest -q
        fi
